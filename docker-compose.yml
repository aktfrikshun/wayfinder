services:
  postgres:
    image: postgres:16
    container_name: wayfinder-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: wayfinder_development
    ports:
      - "5432:5432"
    volumes:
      - wayfinder_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d wayfinder_development"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: wayfinder-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - wayfinder_redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  wayfinder_postgres_data:
  wayfinder_redis_data:
